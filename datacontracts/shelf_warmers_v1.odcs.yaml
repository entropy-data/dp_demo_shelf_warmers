apiVersion: v3.1.0
kind: DataContract
id: shelf-warmers-v1
name: Shelf Warmers
version: 1.0.0
status: active
description:
  purpose: A list of in-stock articles with no sales in last 6 months
team:
  name: fulfillment
schema:
  - name: shelf_warmers
    physicalType: table
    businessName: Shelf Warmers
    description: Shelf warmers are articles in stock that have not been sold in the last 6 months
    properties:
      - name: sku
        logicalType: string
        physicalType: VARCHAR
        required: true
        primaryKey: true
        description: Stock keeping unit.
        authoritativeDefinitions:
          - type: semantics
            url: http://www.entropy-data.com/ns/main/sku
      - name: article_name
        logicalType: string
        physicalType: VARCHAR
        required: false
        description: Display name of the article.
      - name: last_sale_timestamp
        logicalType: timestamp
        physicalType: TIMESTAMP_TZ
        required: false
        description: The timestamp of the last negative stock update event for this article. Used as a proxy for the last sale. May include non-sale events such as write-offs, transfers, or corrections. Null if the article has never had a recorded sale.
      - name: processing_timestamp
        logicalType: timestamp
        physicalType: TIMESTAMP_TZ
        required: true
        description: When this row was written by dbt.
        authoritativeDefinitions:
          - type: semantics
            url: http://www.entropy-data.com/ns/main/processedTimestamp
slaProperties:
  - property: freshness
    value: 25h
    element: shelf_warmers.processing_timestamp
    description: PROCESSING_TIMESTAMP is no older than 25 hours.
  - property: frequency
    value: daily
    description: Data is refreshed once a day.
servers:
  - server: production
    type: snowflake
    account: LMTRWXS-XN14859
    database: DP_SHELF_WARMERS
    schema: DP_SHELF_WARMERS_OP_V1
