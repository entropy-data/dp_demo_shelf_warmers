version: 2

models:
  - name: SHELF_WARMERS
    description: Shelf warmers are articles in stock that have not been sold in the last 6 months.
    meta:
      data_contract:
        id: snowflake_fulfillment_shelf_warmers
        file: models/output_ports/v1/snowflake_fulfillment_shelf_warmers.odcs.yaml
    columns:
      - name: SKU
        description: Stock keeping unit.
        data_tests: [not_null]
      - name: ARTICLE_NAME
        description: Display name of the article.
      - name: LAST_SALE_TIMESTAMP
        description: Timestamp of the last negative stock update event for this article. Used as a proxy for the last sale.
      - name: PROCESSING_TIMESTAMP
        description: When this row was written by dbt.
        data_tests: [not_null]
