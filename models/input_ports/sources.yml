version: 2

sources:
  - name: articles_latest
    description: Current state of all articles, from the articles-latest data product.
    database: DP_ARTICLES_LATEST
    schema: OP_ARTICLES_LATEST_V1
    tables:
      - name: ARTICLES
        description: Current state of all articles.
        columns:
          - name: SKU
            description: Stock keeping unit (primary key).
            data_type: varchar
          - name: NAME
            description: The name of the article.
            data_type: varchar
          - name: COLOR
            description: The color of the article.
            data_type: varchar
          - name: LAST_UPDATED_TIMESTAMP
            description: When this article was last updated upstream.
            data_type: timestamp_ntz
          - name: PROCESS_TIMESTAMP
            description: When this article record was processed.
            data_type: timestamp_ntz

  - name: stock_update_events
    description: All updates to the stock, from the stock-update-events data product.
    database: DP_STOCK_UPDATE_EVENTS
    schema: OP_STOCK_UPDATE_EVENTS_V1
    tables:
      - name: STOCK_UPDATES
        description: All updates to the stock.
        columns:
          - name: SKU
            description: Stock keeping unit.
            data_type: varchar
          - name: LOCATION
            description: The location where the stock is stored.
            data_type: varchar
          - name: AMOUNT
            description: The number of items in stock (negative for sales/write-offs).
            data_type: number
          - name: TIMESTAMP
            description: Actual timestamp of the stock update event.
            data_type: timestamp_ntz
          - name: PROCESSING_TIMESTAMP
            description: When this event was processed.
            data_type: timestamp_ntz
