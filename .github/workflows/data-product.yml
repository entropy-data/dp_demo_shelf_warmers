name: "Shelf Warmers Data Product"
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

env:
  API: https://demo.entropy-data.com/api
  DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
  DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
  DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
  DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
  DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
  DATACONTRACT_SNOWFLAKE_USERNAME: ${{ secrets.DBT_SNOWFLAKE_USER }}
  DATACONTRACT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
  DATACONTRACT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
  DATACONTRACT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install dbt-core dbt-snowflake openlineage-dbt 'datacontract-cli[snowflake]' entropy-data

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          shelf_warmers:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: ${DBT_SNOWFLAKE_ACCOUNT}
                user: ${DBT_SNOWFLAKE_USER}
                password: ${DBT_SNOWFLAKE_PASSWORD}
                role: ${DBT_SNOWFLAKE_ROLE}
                warehouse: ${DBT_SNOWFLAKE_WAREHOUSE}
                database: DP_SHELF_WARMERS
                schema: OP_SHELF_WARMERS_V1
                threads: 4
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt run
        run: dbt-ol run --target prod
        env:
          OPENLINEAGE__TRANSPORT__AUTH__APIKEY: ${{ secrets.ENTROPY_DATA_API_KEY }}

      - name: dbt test
        run: dbt test --target prod

      - name: Publish data product
        run: entropy-data dataproducts put shelf-warmers --file shelf-warmers.odps.yaml
        env:
          ENTROPY_DATA_API_KEY: ${{ secrets.ENTROPY_DATA_API_KEY }}

      - name: Publish data contract
        run: entropy-data datacontracts put snowflake_fulfillment_shelf_warmers --file models/output_ports/v1/snowflake_fulfillment_shelf_warmers.odcs.yaml
        env:
          ENTROPY_DATA_API_KEY: ${{ secrets.ENTROPY_DATA_API_KEY }}

      - name: Data contract test
        run: |
          datacontract test models/output_ports/v1/snowflake_fulfillment_shelf_warmers.odcs.yaml \
            --server production \
            --publish $API/test-results
        env:
          ENTROPY_DATA_API_KEY: ${{ secrets.ENTROPY_DATA_API_KEY }}
