name: 'dp_shelf_warmers'
version: '1.0.0'

profile: 'dp_shelf_warmers'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Silence dbt's "Configuration paths exist in your dbt_project.yml file which do
# not apply to any resources" warning for the staging/intermediate config blocks
# below. Those blocks are kept as scaffolding so future stg_*/int_* models
# inherit the materialization without re-declaring it; until someone adds the
# first model in either directory, dbt rightly notices the config is unused.
# UnusedResourceConfigPath is the dbt event-class name; see
# https://docs.getdbt.com/reference/global-configs/warnings.
flags:
  warn_error_options:
    silence:
      - UnusedResourceConfigPath

# Schema layout follows https://www.entropy-data.com/learn/data-products-with-dbt :
# staging and intermediate models stay in the profile's default schema (internal
# to the data product); output port models override schema='op_v1' via inline
# config(), landing in <profile_schema>_op_v1 — the only public surface.
models:
  dp_shelf_warmers:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
